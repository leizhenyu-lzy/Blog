# ============================================================
#  Rectified Flow + DiT 训练配置 (tiny version)
#  用法: python3 scripts/train_flow_matching.py --config configs/fm_dit_cfg.yaml
# ============================================================

# --- Backbone 选择 (unet / dit), 决定 train_flow_matching.py 装配哪个网络 ---
backbone: dit

# --- 数据 ---
data_root: /home/lzy/Datasets/CelebFacesAttributesDataset
image_size: 64
image_channels: 3
batch_size: 128
num_workers: 4

# --- Flow Matching 过程 ---
flow:
  time_scale: 1000.0

# --- DiT backbone (tiny) ---
dit:
  patch_size: 4
  hidden_size: 256
  depth: 8
  num_heads: 4
  mlp_ratio: 4.0

# --- 训练 ---
epochs: 100
lr: 2.0e-4
grad_clip: 1.0
ema_decay: 0.9999

# --- 采样 ---
n_sample: 64
sample_steps: 50

# --- 日志 & 保存 ---
output_dir_prefix: logs/flow_matching/dit
log_every: 100
save_every: 5
